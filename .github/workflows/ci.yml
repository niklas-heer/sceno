name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build CLI
        run: go build -ldflags="-s -w" -o sceno ./cmd/sceno

      - name: Smoke test CLI
        run: |
          ./sceno --help || true
          ./sceno guide --json | head -c 200
          ./sceno goals | head -n 5

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: macos-apple-silicon
          - goos: darwin
            goarch: amd64
            name: macos-intel
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_SHA::7}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o dist/sceno-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sceno
          file dist/sceno-${{ matrix.goos }}-${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        with:
          name: sceno-${{ matrix.name }}
          path: dist/sceno-${{ matrix.goos }}-${{ matrix.goarch }}
