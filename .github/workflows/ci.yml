name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI pipeline
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.20.8"
          dagger-flags: "--progress plain"
          call: >-
            ci
            --source=.
            --commit=${{ github.sha }}
            --built-at=${{ github.event.head_commit.timestamp || 'unknown' }}
