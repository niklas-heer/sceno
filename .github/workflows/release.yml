name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release artifacts
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.20.8"
          dagger-flags: "--progress plain"
          call: >-
            release
            --source=.
            --tag=${{ github.ref_name }}
            --commit=${{ github.sha }}
            --built-at=${{ github.event.head_commit.timestamp || 'unknown' }}
            export
            --path=dist

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/install.sh
